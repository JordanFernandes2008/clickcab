<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendor Dashboard – Click Cabs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --blue:#01456c; --yellow:#f5a800; --border:#dde3ea; --text:#1a2b3c; --muted:#6b7c8d; --bg:#f4f7fa; }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    .topbar { background:var(--blue); height:60px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(0,0,0,0.2); position:sticky; top:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-left img { height:36px; width:36px; border-radius:6px; background:#fff; padding:3px; object-fit:contain; }
    .topbar-title { color:#fff; font-weight:800; font-size:1.1rem; }
    .topbar-title span { color:var(--yellow); }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .vendor-name-tag { color:rgba(255,255,255,0.85); font-size:0.85rem; }
    .logout-btn { background:rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.2); border-radius:6px; padding:6px 14px; font-size:0.8rem; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; }
    .logout-btn:hover { background:rgba(255,255,255,0.2); }

    .content { max-width:960px; margin:0 auto; padding:28px 20px; }

    /* STATUS BANNER */
    .status-banner { border-radius:14px; padding:22px 26px; margin-bottom:28px; display:flex; align-items:flex-start; gap:18px; }
    .status-banner.pending { background:#fff8e6; border:1.5px solid #f5e4a0; }
    .status-banner.approved { background:#e8f7ef; border:1.5px solid #a8dfc0; }
    .status-banner.rejected { background:#fdf0f0; border:1.5px solid #f5c6c6; }
    .status-banner.restricted { background:#fff0e6; border:1.5px solid #fcd0a8; }
    .status-banner.reverify { background:#f0eaff; border:1.5px solid #d4b8ff; }
    .status-banner.old { background:#f0f4f8; border:1.5px solid #c8d8e4; }
    .banner-icon { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
    .pending .banner-icon { background:#fff3cc; color:#d48e00; }
    .approved .banner-icon { background:#c8f0dc; color:#1a7f4b; }
    .rejected .banner-icon { background:#fdd; color:#c0392b; }
    .restricted .banner-icon { background:#ffe0c8; color:#c05000; }
    .reverify .banner-icon { background:#e4d8ff; color:#6b21d6; }
    .old .banner-icon { background:#dce8f0; color:#4a6070; }
    .banner-text h3 { font-size:1rem; font-weight:800; margin-bottom:4px; }
    .pending .banner-text h3 { color:#d48e00; }
    .approved .banner-text h3 { color:#1a7f4b; }
    .rejected .banner-text h3 { color:#c0392b; }
    .restricted .banner-text h3 { color:#c05000; }
    .reverify .banner-text h3 { color:#6b21d6; }
    .old .banner-text h3 { color:#4a6070; }
    .banner-text p { font-size:0.85rem; color:var(--muted); line-height:1.6; }
    .admin-note { margin-top:10px; font-size:0.83rem; background:rgba(0,0,0,0.05); padding:10px 14px; border-radius:8px; color:var(--text); border-left:3px solid currentColor; }

    .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .card { background:#fff; border-radius:14px; box-shadow:0 2px 12px rgba(1,69,108,0.07); overflow:hidden; }
    .card-header { background:var(--blue); color:#fff; padding:14px 20px; font-size:0.88rem; font-weight:700; display:flex; align-items:center; gap:8px; }
    .card-header i { color:var(--yellow); }
    .card-body { padding:18px 20px; }
    .info-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f0f4f8; font-size:0.83rem; }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--muted); font-weight:600; }
    .info-value { font-weight:700; color:var(--text); text-align:right; max-width:55%; word-break:break-word; }

    /* UPLOAD */
    .upload-card { grid-column:1/-1; }
    .upload-intro { font-size:0.83rem; color:var(--muted); margin-bottom:18px; line-height:1.6; }
    .upload-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
    .upload-item {
      border:2px dashed var(--border); border-radius:12px;
      padding:18px 12px; text-align:center;
      transition:all 0.2s; position:relative; cursor:pointer;
      background:#fafcff;
    }
    .upload-item:hover { border-color:var(--blue); background:#f0f7ff; }
    .upload-item.uploaded { border-color:#1a7f4b; border-style:solid; background:#f0faf5; cursor:default; }
    .upload-item.uploading { border-color:var(--yellow); border-style:solid; background:#fffbf0; }
    .upload-item.error { border-color:#c0392b; border-style:solid; background:#fff8f8; }
    .upload-item .item-icon { font-size:1.6rem; margin-bottom:8px; display:block; }
    .upload-item.locked .item-icon { color:#c8d8e4; }
    .upload-item:not(.locked):not(.uploaded) .item-icon { color:var(--blue); }
    .upload-item.uploaded .item-icon { color:#1a7f4b; }
    .upload-item.uploading .item-icon { color:var(--yellow); }
    .upload-item h4 { font-size:0.75rem; font-weight:700; color:var(--text); margin-bottom:3px; }
    .upload-item .status-text { font-size:0.68rem; color:var(--muted); }
    .upload-item.uploaded .status-text { color:#1a7f4b; font-weight:600; }
    .upload-item.uploading .status-text { color:#d48e00; font-weight:600; }
    .upload-item.error .status-text { color:#c0392b; font-weight:600; }
    .upload-item input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
    .upload-item.uploaded input[type=file], .upload-item.uploading input[type=file] { pointer-events:none; }

    .upload-actions { margin-top:20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
    .submit-docs-btn { background:var(--yellow); color:var(--blue); font-weight:800; font-size:0.92rem; padding:12px 28px; border:none; border-radius:8px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:8px; transition:background 0.2s; }
    .submit-docs-btn:hover { background:#e09900; }
    .submit-docs-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .upload-progress { font-size:0.82rem; color:var(--muted); }

    /* LOCKED OVERLAY */
    .locked-msg { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px; text-align:center; color:var(--muted); }
    .locked-msg i { font-size:2rem; color:#c8d8e4; margin-bottom:10px; }
    .locked-msg p { font-size:0.85rem; }

    .contact-card { margin-top:0; }
    .contact-body { padding:18px 20px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    .contact-body i { font-size:1.5rem; color:var(--blue); flex-shrink:0; }
    .contact-body .contact-text h4 { font-weight:700; font-size:0.9rem; margin-bottom:4px; }
    .contact-body .contact-text p { font-size:0.82rem; color:var(--muted); }
    .contact-body .contact-text a { color:var(--blue); font-weight:700; text-decoration:none; }

    .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:14px; color:var(--muted); }
    .loading-screen i { font-size:2rem; color:var(--blue); }

    @media(max-width:680px) {
      .dash-grid { grid-template-columns:1fr; }
      .upload-grid { grid-template-columns:1fr 1fr; }
    }
    @media(max-width:440px) { .upload-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="images/logo.jpg" alt="Click Cabs"/>
    <span class="topbar-title">Click<span>Cabs</span></span>
  </div>
  <div class="topbar-right">
    <span class="vendor-name-tag" id="vendorNameTag">Loading…</span>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading-screen"><i class="fas fa-spinner fa-spin"></i><p>Loading your dashboard…</p></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCoITUbvm1c0-Ud9VN_jVOZg99dg42jPgY",
    authDomain: "clickcabs-772bd.firebaseapp.com",
    projectId: "clickcabs-772bd",
    storageBucket: "clickcabs-772bd.firebasestorage.app",
    messagingSenderId: "861153834886",
    appId: "1:861153834886:web:eae295a297c47120c31e07"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  await setPersistence(auth, browserLocalPersistence);

  const DOC_TYPES = [
    { key: 'rcBook', label: 'RC Book', icon: 'fa-file-alt' },
    { key: 'insurance', label: 'Insurance Certificate', icon: 'fa-shield-alt' },
    { key: 'driverLicence', label: 'Driver Licence', icon: 'fa-id-card' },
    { key: 'aadhaarCard', label: 'Aadhaar Card', icon: 'fa-address-card' },
    { key: 'panCard', label: 'PAN Card', icon: 'fa-credit-card' },
    { key: 'vehicleFront', label: 'Vehicle Front Photo', icon: 'fa-camera' },
    { key: 'vehicleInterior', label: 'Vehicle Interior Photo', icon: 'fa-car' },
    { key: 'vehicleSide', label: 'Vehicle Side Photo', icon: 'fa-car-side' }
  ];

  let currentUID = null;
  let uploadedDocs = {};
  let selectedFiles = {};

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'vendor-login.html'; return; }
    currentUID = user.uid;
    const vendorDoc = await getDoc(doc(db, "vendors", user.uid));
    if (!vendorDoc.exists()) { window.location.href = 'vendor-login.html'; return; }
    const v = vendorDoc.data();
    uploadedDocs = v.documents || {};
    document.getElementById('vendorNameTag').textContent = `${v.firstName} ${v.lastName}`;
    renderDashboard(v, user.uid);
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth); window.location.href = 'vendor-login.html';
  });

  const statusConfig = {
    pending:    { icon:'fa-clock',        title:"Application Under Review",         color:"#d48e00", msg:"Our team is reviewing your application. You'll receive a call or WhatsApp message once approved (24–48 hours)." },
    approved:   { icon:'fa-check-circle', title:"You're Approved! Welcome aboard 🎉", color:"#1a7f4b", msg:"Your account is active. Please upload your vehicle documents and photos below to complete your onboarding." },
    rejected:   { icon:'fa-times-circle', title:"Application Not Approved",         color:"#c0392b", msg:"Unfortunately your application was not approved. See the note below for details." },
    restricted: { icon:'fa-ban',          title:"Account Restricted",               color:"#c05000", msg:"Your account has been temporarily restricted. See the note below or contact support." },
    reverify:   { icon:'fa-redo',         title:"Reverification Required",          color:"#6b21d6", msg:"Our team requires you to reverify certain details. See the note below or contact support." },
    old:        { icon:'fa-archive',      title:"Account Marked as Inactive",       color:"#4a6070", msg:"Your account is currently inactive. Contact Click Cabs support to reactivate." }
  };

  function renderDashboard(v, uid) {
    const status = v.status || 'pending';
    const isApproved = status === 'approved';
    const cfg = statusConfig[status] || statusConfig.pending;

    const uploadSection = isApproved ? `
      <p class="upload-intro">Upload clear photos/scans of your documents. Accepted: JPG, PNG, PDF (max 10MB each). All 8 documents are required to complete onboarding.</p>
      <div class="upload-grid" id="uploadGrid">
        ${DOC_TYPES.map(d => {
          const alreadyUploaded = uploadedDocs[d.key];
          return `<div class="upload-item ${alreadyUploaded ? 'uploaded' : ''}" id="item_${d.key}">
            <i class="fas ${alreadyUploaded ? 'fa-check-circle' : d.icon} item-icon"></i>
            <h4>${d.label}</h4>
            <div class="status-text" id="status_${d.key}">${alreadyUploaded ? 'Uploaded ✓' : 'Click to upload'}</div>
            ${!alreadyUploaded ? `<input type="file" accept=".jpg,.jpeg,.png,.pdf" data-key="${d.key}" onchange="fileChosen(this)"/>` : ''}
          </div>`;
        }).join('')}
      </div>
      <div class="upload-actions">
        <button class="submit-docs-btn" id="submitDocsBtn" onclick="uploadAllDocs('${uid}')">
          <i class="fas fa-cloud-upload-alt"></i> Upload & Save Documents
        </button>
        <span class="upload-progress" id="uploadProgress"></span>
      </div>` :
      `<div class="locked-msg">
        <i class="fas fa-lock"></i>
        <p>Document upload will be unlocked once your application is approved by our team.</p>
      </div>`;

    document.getElementById('mainContent').innerHTML = `
      <div class="status-banner ${status}">
        <div class="banner-icon"><i class="fas ${cfg.icon}"></i></div>
        <div class="banner-text">
          <h3>${cfg.title}</h3>
          <p>${cfg.msg}</p>
          ${v.adminNote ? `<div class="admin-note"><strong>Note from Click Cabs:</strong> ${v.adminNote}</div>` : ''}
        </div>
      </div>

      <div class="dash-grid">
        <div class="card">
          <div class="card-header"><i class="fas fa-user"></i> Your Details</div>
          <div class="card-body">
            <div class="info-row"><span class="info-label">Name</span><span class="info-value">${v.firstName} ${v.lastName}</span></div>
            <div class="info-row"><span class="info-label">Phone</span><span class="info-value">${v.phone||'–'}</span></div>
            <div class="info-row"><span class="info-label">Email</span><span class="info-value">${v.email||'–'}</span></div>
            <div class="info-row"><span class="info-label">City</span><span class="info-value">${v.operatingCity||'–'}</span></div>
            <div class="info-row"><span class="info-label">Driver Type</span><span class="info-value">${v.driverType||'–'}</span></div>
            <div class="info-row"><span class="info-label">Status</span><span class="info-value" style="color:${cfg.color};text-transform:capitalize;">${status}</span></div>
          </div>
        </div>

        <div class="card">
          <div class="card-header"><i class="fas fa-car"></i> Vehicle Details</div>
          <div class="card-body">
            <div class="info-row"><span class="info-label">Model</span><span class="info-value">${v.vehicleModel||'–'}</span></div>
            <div class="info-row"><span class="info-label">Type</span><span class="info-value">${v.vehicleType||'–'}</span></div>
            <div class="info-row"><span class="info-label">Year</span><span class="info-value">${v.vehicleYear||'–'}</span></div>
            <div class="info-row"><span class="info-label">Reg. No.</span><span class="info-value">${v.registrationNumber||'–'}</span></div>
            <div class="info-row"><span class="info-label">Fuel / AC</span><span class="info-value">${v.fuelType||'–'} / ${v.acAvailable==='yes'?'AC':'Non-AC'}</span></div>
            <div class="info-row"><span class="info-label">Seating</span><span class="info-value">${v.seatingCapacity||'–'}</span></div>
          </div>
        </div>

        <div class="card upload-card">
          <div class="card-header"><i class="fas fa-file-upload"></i> Documents & Photos</div>
          <div class="card-body">${uploadSection}</div>
        </div>
      </div>

      <div class="card contact-card">
        <div class="contact-body">
          <i class="fas fa-headset"></i>
          <div class="contact-text">
            <h4>Need help? Contact Click Cabs Support</h4>
            <p>Call / WhatsApp: <a href="tel:+919702290804">+91 97022 90804</a> &nbsp;|&nbsp; Email: <a href="mailto:support@clickcabs.in">support@clickcabs.in</a></p>
          </div>
        </div>
      </div>`;
  }

  window.fileChosen = function(input) {
    const key = input.dataset.key;
    const file = input.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert('File too large. Max size is 10MB.'); return;
    }
    selectedFiles[key] = file;
    const item = document.getElementById(`item_${key}`);
    item.classList.add('uploading');
    item.querySelector('i').className = 'fas fa-file-check item-icon';
    document.getElementById(`status_${key}`).textContent = file.name.length > 18 ? file.name.substring(0,18)+'…' : file.name;
  };

  window.uploadAllDocs = async function(uid) {
    if (Object.keys(selectedFiles).length === 0) {
      alert('Please select at least one file to upload.'); return;
    }
    const btn = document.getElementById('submitDocsBtn');
    const progress = document.getElementById('uploadProgress');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Uploading…';

    const keys = Object.keys(selectedFiles);
    let done = 0;
    const newDocs = { ...uploadedDocs };

    for (const key of keys) {
      const file = selectedFiles[key];
      progress.textContent = `Uploading ${done + 1} of ${keys.length}…`;
      try {
        const storageRef = ref(storage, `vendors/${uid}/documents/${key}_${Date.now()}`);
        const uploadTask = uploadBytesResumable(storageRef, file);
        const url = await new Promise((resolve, reject) => {
          uploadTask.on('state_changed', null, reject, async () => {
            resolve(await getDownloadURL(uploadTask.snapshot.ref));
          });
        });
        newDocs[key] = url;
        const item = document.getElementById(`item_${key}`);
        if (item) {
          item.classList.remove('uploading'); item.classList.add('uploaded');
          item.querySelector('i').className = 'fas fa-check-circle item-icon';
          document.getElementById(`status_${key}`).textContent = 'Uploaded ✓';
        }
        done++;
      } catch (err) {
        const item = document.getElementById(`item_${key}`);
        if (item) { item.classList.add('error'); document.getElementById(`status_${key}`).textContent = 'Upload failed'; }
      }
    }

    await updateDoc(doc(db, "vendors", uid), { documents: newDocs, documentsUpdatedAt: new Date().toISOString() });
    uploadedDocs = newDocs;
    selectedFiles = {};
    progress.textContent = `✓ ${done} of ${keys.length} files uploaded successfully!`;
    btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Upload & Save Documents';
    btn.disabled = false;
  };
</script>
</body>
</html>
