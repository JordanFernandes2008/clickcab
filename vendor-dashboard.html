<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vendor Dashboard – Click Cabs</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --blue:#01456c; --yellow:#f5a800; --border:#dde3ea; --text:#1a2b3c; --muted:#6b7c8d; --bg:#f4f7fa; }
    body { font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

    /* TOPBAR */
    .topbar {
      background:var(--blue); height:60px; padding:0 28px;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow:0 2px 8px rgba(0,0,0,0.2); position:sticky; top:0; z-index:100;
    }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-left img { height:36px; width:36px; border-radius:6px; background:#fff; padding:3px; object-fit:contain; }
    .topbar-title { color:#fff; font-weight:800; font-size:1.1rem; }
    .topbar-title span { color:var(--yellow); }
    .topbar-right { display:flex; align-items:center; gap:14px; }
    .vendor-name-tag { color:rgba(255,255,255,0.85); font-size:0.85rem; }
    .logout-btn {
      background:rgba(255,255,255,0.1); color:#fff;
      border:1px solid rgba(255,255,255,0.2); border-radius:6px;
      padding:6px 14px; font-size:0.8rem; cursor:pointer;
      font-family:inherit; display:flex; align-items:center; gap:6px;
    }
    .logout-btn:hover { background:rgba(255,255,255,0.2); }

    .content { max-width:960px; margin:0 auto; padding:28px 20px; }

    /* STATUS BANNER */
    .status-banner {
      border-radius:14px; padding:22px 26px; margin-bottom:28px;
      display:flex; align-items:center; gap:18px;
    }
    .status-banner.pending { background:#fff8e6; border:1.5px solid #f5e4a0; }
    .status-banner.approved { background:#e8f7ef; border:1.5px solid #a8dfc0; }
    .status-banner.rejected { background:#fdf0f0; border:1.5px solid #f5c6c6; }
    .status-banner.restricted { background:#fff0e6; border:1.5px solid #fcd0a8; }
    .status-banner.reverify { background:#f0eaff; border:1.5px solid #d4b8ff; }
    .status-banner.old { background:#f0f4f8; border:1.5px solid #c8d8e4; }

    .banner-icon { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.4rem; flex-shrink:0; }
    .pending .banner-icon { background:#fff3cc; color:#d48e00; }
    .approved .banner-icon { background:#c8f0dc; color:#1a7f4b; }
    .rejected .banner-icon { background:#fdd; color:#c0392b; }
    .restricted .banner-icon { background:#ffe0c8; color:#c05000; }
    .reverify .banner-icon { background:#e4d8ff; color:#6b21d6; }
    .old .banner-icon { background:#dce8f0; color:#4a6070; }

    .banner-text h3 { font-size:1rem; font-weight:800; margin-bottom:4px; }
    .pending .banner-text h3 { color:#d48e00; }
    .approved .banner-text h3 { color:#1a7f4b; }
    .rejected .banner-text h3 { color:#c0392b; }
    .restricted .banner-text h3 { color:#c05000; }
    .reverify .banner-text h3 { color:#6b21d6; }
    .old .banner-text h3 { color:#4a6070; }
    .banner-text p { font-size:0.85rem; color:var(--muted); line-height:1.5; }
    .banner-text .admin-note { margin-top:8px; font-size:0.82rem; background:rgba(0,0,0,0.04); padding:8px 12px; border-radius:8px; color:var(--text); }

    /* GRID */
    .dash-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
    .card {
      background:#fff; border-radius:14px;
      box-shadow:0 2px 12px rgba(1,69,108,0.07);
      overflow:hidden;
    }
    .card-header {
      background:var(--blue); color:#fff; padding:14px 20px;
      font-size:0.88rem; font-weight:700;
      display:flex; align-items:center; gap:8px;
    }
    .card-header i { color:var(--yellow); }
    .card-body { padding:18px 20px; }

    .info-row {
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 0; border-bottom:1px solid #f0f4f8; font-size:0.83rem;
    }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--muted); font-weight:600; }
    .info-value { font-weight:700; color:var(--text); text-align:right; }

    /* UPLOAD SECTION */
    .upload-card { grid-column:1/-1; }
    .upload-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .upload-item {
      border:2px dashed var(--border); border-radius:10px;
      padding:20px 14px; text-align:center; cursor:pointer;
      transition:all 0.2s; position:relative;
    }
    .upload-item:hover { border-color:var(--blue); background:#f8fafc; }
    .upload-item.uploaded { border-color:#1a7f4b; border-style:solid; background:#f0faf5; }
    .upload-item i { font-size:1.8rem; color:var(--muted); margin-bottom:8px; display:block; }
    .upload-item.uploaded i { color:#1a7f4b; }
    .upload-item h4 { font-size:0.78rem; font-weight:700; color:var(--text); margin-bottom:4px; }
    .upload-item p { font-size:0.72rem; color:var(--muted); }
    .upload-item input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
    .upload-item .uploaded-name { font-size:0.7rem; color:#1a7f4b; font-weight:600; margin-top:6px; }

    /* LOCKED OVERLAY for non-approved */
    .locked-overlay {
      position:absolute; inset:0; background:rgba(244,247,250,0.85);
      border-radius:10px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:6px;
      font-size:0.78rem; color:var(--muted); font-weight:600;
    }
    .locked-overlay i { font-size:1.4rem; color:#c8d8e4; }

    .save-btn {
      margin-top:16px; background:var(--yellow); color:var(--blue);
      font-weight:800; font-size:0.92rem; padding:12px 32px;
      border:none; border-radius:8px; cursor:pointer;
      font-family:inherit; transition:background 0.2s;
      display:flex; align-items:center; gap:8px;
    }
    .save-btn:hover { background:#e09900; }
    .save-btn:disabled { opacity:0.5; cursor:not-allowed; }

    .loading-screen {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; min-height:60vh; gap:14px; color:var(--muted);
    }
    .loading-screen i { font-size:2rem; color:var(--blue); }

    @media(max-width:680px) {
      .dash-grid { grid-template-columns:1fr; }
      .upload-grid { grid-template-columns:1fr 1fr; }
    }
    @media(max-width:440px) {
      .upload-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <img src="images/logo.jpg" alt="Click Cabs"/>
    <span class="topbar-title">Click<span>Cabs</span></span>
  </div>
  <div class="topbar-right">
    <span class="vendor-name-tag" id="vendorNameTag">Loading…</span>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="content" id="mainContent">
  <div class="loading-screen">
    <i class="fas fa-spinner fa-spin"></i>
    <p>Loading your dashboard…</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCoITUbvm1c0-Ud9VN_jVOZg99dg42jPgY",
    authDomain: "clickcabs-772bd.firebaseapp.com",
    projectId: "clickcabs-772bd",
    storageBucket: "clickcabs-772bd.firebasestorage.app",
    messagingSenderId: "861153834886",
    appId: "1:861153834886:web:eae295a297c47120c31e07"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // 30-day persistence
  await setPersistence(auth, browserLocalPersistence);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'vendor-login.html'; return; }

    const vendorDoc = await getDoc(doc(db, "vendors", user.uid));
    if (!vendorDoc.exists()) { window.location.href = 'vendor-login.html'; return; }

    const v = vendorDoc.data();
    document.getElementById('vendorNameTag').textContent = `${v.firstName} ${v.lastName}`;
    renderDashboard(v);
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await signOut(auth); window.location.href = 'vendor-login.html';
  });

  function renderDashboard(v) {
    const status = v.status || 'pending';
    const isApproved = status === 'approved';

    const bannerContent = {
      pending: { icon:'fa-clock', title:'Application Under Review', msg:'Our team is reviewing your application. You will receive a call or WhatsApp message on your registered mobile once approved. This usually takes 24–48 hours.' },
      approved: { icon:'fa-check-circle', title:'You\'re Approved! Welcome to Click Cabs', msg:'Your account is active. Please upload your vehicle documents and photos below to complete your onboarding.' },
      rejected: { icon:'fa-times-circle', title:'Application Not Approved', msg:'Unfortunately your application was not approved at this time.' },
      restricted: { icon:'fa-ban', title:'Account Restricted', msg:'Your account has been temporarily restricted by our team.' },
      reverify: { icon:'fa-redo', title:'Reverification Required', msg:'Our team requires you to reverify certain details. Please contact Click Cabs support.' },
      old: { icon:'fa-archive', title:'Account Marked as Inactive', msg:'Your account has been marked as inactive. Please contact Click Cabs support to reactivate.' }
    };

    const b = bannerContent[status] || bannerContent.pending;

    document.getElementById('mainContent').innerHTML = `
      <!-- STATUS BANNER -->
      <div class="status-banner ${status}">
        <div class="banner-icon"><i class="fas ${b.icon}"></i></div>
        <div class="banner-text">
          <h3>${b.title}</h3>
          <p>${b.msg}</p>
          ${v.adminNote ? `<div class="admin-note"><strong>Note from Click Cabs:</strong> ${v.adminNote}</div>` : ''}
        </div>
      </div>

      <!-- DASHBOARD GRID -->
      <div class="dash-grid">

        <!-- PERSONAL INFO -->
        <div class="card">
          <div class="card-header"><i class="fas fa-user"></i> Your Details</div>
          <div class="card-body">
            <div class="info-row"><span class="info-label">Name</span><span class="info-value">${v.firstName} ${v.lastName}</span></div>
            <div class="info-row"><span class="info-label">Phone</span><span class="info-value">${v.phone||'–'}</span></div>
            <div class="info-row"><span class="info-label">Email</span><span class="info-value">${v.email||'–'}</span></div>
            <div class="info-row"><span class="info-label">City</span><span class="info-value">${v.operatingCity||'–'}</span></div>
            <div class="info-row"><span class="info-label">Driver Type</span><span class="info-value">${v.driverType||'–'}</span></div>
          </div>
        </div>

        <!-- VEHICLE INFO -->
        <div class="card">
          <div class="card-header"><i class="fas fa-car"></i> Vehicle Details</div>
          <div class="card-body">
            <div class="info-row"><span class="info-label">Model</span><span class="info-value">${v.vehicleModel||'–'}</span></div>
            <div class="info-row"><span class="info-label">Type</span><span class="info-value">${v.vehicleType||'–'}</span></div>
            <div class="info-row"><span class="info-label">Year</span><span class="info-value">${v.vehicleYear||'–'}</span></div>
            <div class="info-row"><span class="info-label">Reg. No.</span><span class="info-value">${v.registrationNumber||'–'}</span></div>
            <div class="info-row"><span class="info-label">Fuel / AC</span><span class="info-value">${v.fuelType||'–'} / ${v.acAvailable==='yes'?'AC':'Non-AC'}</span></div>
            <div class="info-row"><span class="info-label">Seating</span><span class="info-value">${v.seatingCapacity||'–'}</span></div>
          </div>
        </div>

        <!-- DOCUMENT UPLOAD -->
        <div class="card upload-card" style="position:relative;">
          <div class="card-header"><i class="fas fa-file-upload"></i> Upload Documents & Photos</div>
          <div class="card-body">
            <p style="font-size:0.82rem;color:var(--muted);margin-bottom:16px;">
              ${isApproved ? 'Upload clear photos of your documents. Accepted formats: JPG, PNG, PDF (max 5MB each).' : 'Document upload will be enabled once your application is approved.'}
            </p>
            <div class="upload-grid" id="uploadGrid">
              ${['RC Book','Insurance Certificate','Driver Licence','Aadhaar Card','PAN Card','Vehicle Front Photo','Vehicle Interior Photo','Vehicle Side Photo'].map((name,i) => `
              <div class="upload-item ${isApproved?'':'locked'}" id="uploadItem${i}">
                <i class="fas ${isApproved?'fa-cloud-upload-alt':'fa-lock'}"></i>
                <h4>${name}</h4>
                <p>${isApproved?'Click to upload':'Locked'}</p>
                ${isApproved?`<input type="file" accept=".jpg,.jpeg,.png,.pdf" onchange="fileSelected(this, ${i}, '${name}')"/>`:''}
                ${!isApproved?`<div class="locked-overlay"><i class="fas fa-lock"></i><span>Pending approval</span></div>`:''}
                <div class="uploaded-name" id="fileName${i}"></div>
              </div>`).join('')}
            </div>
            ${isApproved?`<button class="save-btn" id="saveDocsBtn"><i class="fas fa-save"></i> Save & Submit Documents</button>`:''}
          </div>
        </div>

      </div>

      <!-- CONTACT -->
      <div class="card" style="margin-top:0;">
        <div class="card-body" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <i class="fas fa-headset" style="font-size:1.5rem;color:var(--blue);flex-shrink:0;"></i>
          <div>
            <div style="font-weight:700;font-size:0.9rem;margin-bottom:4px;">Need help? Contact Click Cabs Support</div>
            <div style="font-size:0.82rem;color:var(--muted);">
              Call / WhatsApp: <a href="tel:+919702290804" style="color:var(--blue);font-weight:700;">+91 97022 90804</a> &nbsp;|&nbsp;
              Email: <a href="mailto:support@clickcabs.in" style="color:var(--blue);font-weight:700;">support@clickcabs.in</a>
            </div>
          </div>
        </div>
      </div>`;
  }

  window.fileSelected = function(input, index, name) {
    if (input.files[0]) {
      const item = document.getElementById(`uploadItem${index}`);
      item.classList.add('uploaded');
      item.querySelector('i').className = 'fas fa-check-circle';
      document.getElementById(`fileName${index}`).textContent = input.files[0].name;
    }
  };
</script>

</body>
</html>
